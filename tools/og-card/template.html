<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>OG card — En Veille</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..500;1,9..144,400..500&family=Inter:wght@400..500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF7EE;
    --navy: #001B3D;
    --blue: #007DA5;
    --cyan: #00F2FF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--cream); width: 1200px; height: 630px; overflow: hidden; }

  .card {
    width: 1200px;
    height: 630px;
    background: var(--cream);
    color: var(--navy);
    display: grid;
    grid-template-columns: 1fr 460px;
    gap: 40px;
    padding: 72px 80px;
    overflow: hidden;
  }

  .text {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
  }

  .top {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 22px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .title {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-variation-settings: "opsz" 144;
    font-weight: 500;
    font-size: 152px;
    line-height: 0.95;
    letter-spacing: -0.015em;
  }

  .tagline {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 36px;
    line-height: 1.3;
    font-weight: 400;
    max-width: 580px;
  }

  .domain {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .visual {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .visual img {
    width: 100%;
    max-width: 380px;
    height: auto;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="text">
    <div class="top">
      <div class="eyebrow" id="eyebrow">DEV INDÉ · TOULOUSE · DEPUIS 2011</div>
      <h1 class="title" id="title">En Veille</h1>
      <p class="tagline" id="tagline">Un dev qui livre, et qui laisse l'équipe grandie.</p>
    </div>
    <div class="domain" id="domain">enveille.info</div>
  </div>
  <div class="visual">
    <img src="../../images/logo.svg" alt="">
  </div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const set = (id, key) => {
    const v = params.get(key);
    if (v !== null) document.getElementById(id).textContent = v;
  };
  set('eyebrow', 'eyebrow');
  set('title', 'title');
  set('tagline', 'tagline');
  set('domain', 'domain');

  document.fonts.ready.then(() => {
    document.documentElement.dataset.fontsReady = 'true';
  });
</script>
</body>
</html>
