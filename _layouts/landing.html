<!DOCTYPE html>
<html lang="{{ site.locale | default: 'fr_FR' | replace: '_', '-' }}" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines | escape }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{{ site.locale | default: 'fr_FR' }}">
  <meta property="og:image" content="{{ '/images/logo.png' | absolute_url }}">
  <meta name="twitter:card" content="summary">

  <meta name="theme-color" content="#001B3D" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000331" media="(prefers-color-scheme: dark)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..500;1,9..144,400..500&family=Inter:wght@400..500&family=JetBrains+Mono:wght@400&family=Caveat:wght@500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..500;1,9..144,400..500&family=Inter:wght@400..500&family=JetBrains+Mono:wght@400&family=Caveat:wght@500&display=swap"></noscript>

  <link rel="stylesheet" href="{{ '/assets/css/enveille.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/landing.css' | relative_url }}">

  {% feed_meta %}
</head>
<body class="landing">
  <a class="ev-skip-link" href="#main">Aller au contenu</a>

  {{ content }}

  <script defer src="{{ '/assets/js/landing.js' | relative_url }}"></script>
</body>
</html>
